<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../resources/assets/favicon.ico">
<title>Web Dev Mastery Dashboard — Progress Tracker</title>
<style>
/* ============================ THEME TOKENS ============================ */
:root{
  --bg:#eef4f6; --bg2:#e4edf0; --panel:#ffffff; --panel2:#f7fafb;
  --ink:#20313c; --muted:#637886; --faint:#8aa0ac; --line:#d5e1e8; --line2:#e7eef2;
  --teal:#0f7f79; --blue:#2166a5; --coral:#c85d4a; --amber:#a86e17; --green:#25764a; --purple:#6d4aa8; --pink:#b8456f;
  --soft-teal:#e2f3f1; --soft-blue:#e7f0fa; --soft-coral:#fae8e3; --soft-amber:#fbf0d9; --soft-green:#e5f3ea; --soft-purple:#efe8f8; --soft-pink:#fbe6ee;
  --shadow:0 14px 34px rgba(35,52,63,.10); --shadow-sm:0 4px 12px rgba(35,52,63,.07);
  --radius:12px; --radius-sm:8px;
  --ms0:#c2ced6; --ms1:#7aa7c7; --ms2:#3f8fb0; --ms3:#d39a3c; --ms4:#2f9e6b; --ms5:#6d4aa8;
}
[data-theme="dark"]{
  --bg:#0e1620; --bg2:#0a1119; --panel:#16212e; --panel2:#1c2937;
  --ink:#e6eef4; --muted:#9fb3c2; --faint:#6e8595; --line:#26323f; --line2:#202b37;
  --teal:#2bb3a8; --blue:#5295e0; --coral:#e7806c; --amber:#d8a445; --green:#46b97e; --purple:#a07fe0; --pink:#e07298;
  --soft-teal:#13302e; --soft-blue:#13263a; --soft-coral:#33201b; --soft-amber:#332a17; --soft-green:#15301f; --soft-purple:#241c34; --soft-pink:#331e28;
  --shadow:0 16px 40px rgba(0,0,0,.45); --shadow-sm:0 4px 14px rgba(0,0,0,.35);
  --ms0:#3a4856; --ms1:#3d6685; --ms2:#2f7d9c; --ms3:#b9832f; --ms4:#2f9e6b; --ms5:#8a6bc7;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(180deg,var(--bg),var(--bg2));font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;font-size:15px;line-height:1.5;transition:background .3s,color .3s}
a{color:var(--teal);text-decoration:none}
button,input,select,textarea{font:inherit;color:inherit}
h1,h2,h3,h4{margin:0;line-height:1.2}
::selection{background:var(--soft-teal);color:var(--ink)}
:focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:6px}
/* LAYOUT */
.app{display:grid;grid-template-columns:248px minmax(0,1fr);min-height:100vh}
.sidebar{position:sticky;top:0;align-self:start;height:100vh;overflow-y:auto;background:var(--panel);border-right:1px solid var(--line);padding:18px 14px}
.brand{display:flex;gap:11px;align-items:center;margin:4px 4px 18px}
.brand-logo{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,var(--teal),var(--blue));flex-shrink:0}
.brand b{font-size:15px;display:block}
.brand small{color:var(--muted);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.nav-label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:14px 8px 4px}
.nav a{display:flex;gap:10px;align-items:center;padding:9px 11px;border-radius:9px;color:var(--muted);font-weight:600;font-size:13.5px;cursor:pointer;border:1px solid transparent}
.nav a:hover{background:var(--panel2);color:var(--ink)}
.nav a.active{background:var(--soft-teal);color:var(--teal);border-color:color-mix(in srgb,var(--teal) 25%,transparent);font-weight:800}
.nav a svg{width:17px;height:17px;flex-shrink:0}
.nav-spacer{flex:1;min-height:8px}
.main{min-width:0;padding:22px 26px 60px}
.topbar{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
.topbar h1{font-size:clamp(20px,2.6vw,27px)}
.topbar .sub{color:var(--muted);font-size:13px;margin-top:3px}
.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.menu-toggle{display:none}
/* COMPONENTS */
.btn{display:inline-flex;gap:7px;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;padding:9px 13px;font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--teal);background:var(--panel2)}
.btn svg{width:15px;height:15px}
.btn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn.primary:hover{filter:brightness(1.07)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.icon{padding:9px;width:38px;height:38px}
.btn.danger:hover{border-color:var(--coral);color:var(--coral)}
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 11px;font-size:11.5px;font-weight:800;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.pad{padding:18px}
.card-grid{display:grid;gap:14px}
.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:26px 0 12px;flex-wrap:wrap}
.section-head h2{font-size:17px}
.section-head p{color:var(--muted);font-size:12.5px;margin:2px 0 0}
.muted{color:var(--muted)}.small{font-size:12px}
.divider{height:1px;background:var(--line);margin:16px 0}
.stat{position:relative;overflow:hidden;padding:16px}
.stat .lbl{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.stat .val{font-size:30px;font-weight:800;margin:6px 0 2px;letter-spacing:-.02em}
.stat .delta{font-size:12px;font-weight:700}
.stat .ic{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:9px;display:grid;place-items:center}
.up{color:var(--green)}.down{color:var(--coral)}
.bar{height:9px;border-radius:999px;background:var(--line2);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .6s cubic-bezier(.2,.8,.2,1)}
.bar.thin{height:6px}
.barrow{display:flex;align-items:center;gap:10px;margin:9px 0}
.barrow .nm{flex:1;min-width:0;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.barrow .pct{font-size:12px;font-weight:800;width:42px;text-align:right;color:var(--muted)}
.ring{--p:0;--c:var(--teal);width:128px;height:128px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--c) calc(var(--p)*1%),var(--line2) 0);position:relative;flex-shrink:0}
.ring::before{content:"";position:absolute;inset:12px;border-radius:50%;background:var(--panel)}
.ring .rc{position:relative;text-align:center}
.ring .rc b{font-size:27px;font-weight:800;display:block}
.ring .rc span{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:800}
.pill.crit{background:var(--soft-coral);color:var(--coral)}
.pill.high{background:var(--soft-amber);color:var(--amber)}
.pill.med{background:var(--soft-blue);color:var(--blue)}
.pill.low{background:var(--soft-green);color:var(--green)}
.pill.exp{background:var(--soft-purple);color:var(--purple)}
.pill.t0{background:var(--soft-blue);color:var(--blue)}
.module{margin-bottom:14px}
.module-head{display:flex;gap:13px;align-items:center;padding:15px 16px;cursor:pointer;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);transition:.15s}
.module-head:hover{border-color:var(--teal)}
.module.open .module-head{border-bottom-left-radius:0;border-bottom-right-radius:0}
.module-ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;color:#fff;flex-shrink:0;font-weight:800;font-size:17px}
.module-head .mt{flex:1;min-width:0}
.module-head .mt b{font-size:15px;display:block}
.module-head .mt small{color:var(--muted);font-size:12px}
.module-head .mpct{text-align:right;min-width:124px}
.module-head .caret{transition:transform .2s;color:var(--muted);flex-shrink:0}
.module.open .caret{transform:rotate(90deg)}
.module-body{display:none;border:1px solid var(--line);border-top:0;border-radius:0 0 var(--radius) var(--radius);background:var(--panel2);padding:6px 14px 12px}
.module.open .module-body{display:block}
.chapter{padding:10px 4px;border-bottom:1px dashed var(--line)}
.chapter:last-child{border-bottom:0}
.chapter>h4{font-size:13.5px;display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.chapter>h4 .ct{color:var(--faint);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em}
.concept{display:flex;gap:10px;align-items:center;padding:8px 10px;border-radius:9px;flex-wrap:wrap}
.concept:hover{background:var(--panel)}
.concept .cn{flex:1;min-width:170px;font-size:13px}
.concept .cn small{display:block;color:var(--muted);font-size:11.5px}
.mastery-grid{display:flex;gap:9px;flex-wrap:wrap}
.mm{display:flex;flex-direction:column;align-items:center;gap:3px}
.mm label{font-size:8.5px;font-weight:800;text-transform:uppercase;color:var(--faint);letter-spacing:.02em}
.mini-rate{display:flex;gap:2px}
.mini-rate i{width:13px;height:13px;border-radius:3px;background:var(--line2);cursor:pointer;transition:.1s}
.mini-rate i.on{background:var(--teal)}
.mini-rate i:hover{transform:scale(1.18)}
.heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(15px,1fr));gap:4px}
.heat i{aspect-ratio:1;border-radius:3px;background:var(--line2)}
.heat i[data-l="1"]{background:color-mix(in srgb,var(--teal) 28%,var(--line2))}
.heat i[data-l="2"]{background:color-mix(in srgb,var(--teal) 52%,var(--line2))}
.heat i[data-l="3"]{background:color-mix(in srgb,var(--teal) 76%,var(--line2))}
.heat i[data-l="4"]{background:var(--teal)}
.ach{display:flex;gap:11px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:11px;background:var(--panel)}
.ach.locked{opacity:.48;filter:grayscale(.6)}
.ach .ab{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;font-size:21px;flex-shrink:0;background:var(--soft-amber)}
.ach b{font-size:13.5px;display:block}
.ach small{color:var(--muted);font-size:11.5px}
.row{display:flex;gap:11px;align-items:center;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--panel);margin-bottom:8px}
.row .rl{flex:1;min-width:0}
.row .rl b{font-size:13.5px;display:block}
.row .rl small{color:var(--muted);font-size:11.5px}
.timer-wrap{text-align:center;padding:8px}
.timer-time{font-size:54px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.timer-mode{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.timer-controls{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.goal{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line)}
.goal:last-child{border-bottom:0}
.goal input[type=checkbox]{width:18px;height:18px;accent-color:var(--teal);cursor:pointer;flex-shrink:0}
.goal .gt{flex:1;font-size:13.5px}
.goal.done .gt{text-decoration:line-through;color:var(--muted)}
input[type=text],input[type=number],input[type=date],textarea,select{border:1px solid var(--line);background:var(--panel2);border-radius:9px;padding:9px 11px;width:100%}
textarea{resize:vertical;min-height:70px;font-family:inherit}
label.fl{font-size:12px;font-weight:800;color:var(--muted);display:block;margin-bottom:5px}
.view{display:none;animation:fade .3s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(160%);background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:10px;font-weight:700;font-size:13px;box-shadow:var(--shadow);z-index:200;transition:transform .35s cubic-bezier(.2,.8,.2,1);max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.focus-banner{display:none;align-items:center;gap:12px;justify-content:space-between;background:var(--soft-purple);border:1px solid color-mix(in srgb,var(--purple) 30%,transparent);color:var(--purple);padding:11px 16px;border-radius:11px;margin-bottom:16px;font-weight:700}
body.focus-dim .focus-banner{display:flex}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:6px}
.scroll-x{overflow-x:auto}
table.grid{width:100%;border-collapse:collapse;font-size:13px}
table.grid th,table.grid td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line)}
table.grid th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.spark{display:flex;align-items:flex-end;gap:4px;height:60px}
.spark i{flex:1;background:linear-gradient(180deg,var(--teal),var(--blue));border-radius:3px 3px 0 0;min-height:3px;opacity:.9;position:relative}
.spark.empty{align-items:center;justify-content:center;color:var(--muted);font-size:12px}
@media(max-width:980px){.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}.cols-3{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;z-index:120;width:262px;left:0;top:0;transform:translateX(-105%);transition:transform .28s ease;box-shadow:var(--shadow)}
  body.nav-open .sidebar{transform:translateX(0)}
  .menu-toggle{display:inline-flex}
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:110}
  body.nav-open .scrim{display:block}
  .main{padding:16px 14px 50px}
}
@media(max-width:620px){.cols-2,.cols-3,.cols-4{grid-template-columns:1fr}.timer-time{font-size:44px}.module-head .mpct{min-width:84px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

    </nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <div style="display:flex;gap:12px;align-items:center">
        <button class="btn icon menu-toggle" id="menuToggle" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>

</div>
<div class="toast" id="toast"></div>
<script src="tracker_app.js"></script>
</body>
